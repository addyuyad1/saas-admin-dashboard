<section class="login-shell">
  <div class="login-panel app-card">
    <p class="login-panel__eyebrow">Enterprise starter</p>
    <h1>Sign in to the admin dashboard</h1>
    <p class="login-panel__copy">
      This scaffold uses a mock auth flow so you can wire enterprise structure,
      routing, and HTTP concerns before integrating a real identity provider.
    </p>

    <button appAutofocus class="login-panel__button" type="button" (click)="signIn()">
      Continue as Demo Admin
    </button>
  </div>
</section>
