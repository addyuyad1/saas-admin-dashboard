<header class="header app-card">
  <div>
    <p class="header__eyebrow">Admin workspace</p>
    <h1>Enterprise operations dashboard</h1>
  </div>

  <div class="header__actions" *ngIf="session$ | async as session">
    <span
      class="status-pill"
      [class.status-pill--syncing]="(connectionState$ | async) === 'syncing'"
    >
      {{ (connectionState$ | async) === 'syncing' ? 'Syncing' : 'Live' }}
    </span>

    <div class="header__user-menu">
      <button
        type="button"
        class="header__user-button"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen"
        aria-haspopup="menu"
      >
        <span class="header__avatar">{{ getInitials(session.user) }}</span>
        <span class="header__profile">
          <strong>{{ session.user.name }}</strong>
          <span>{{ session.user.email }}</span>
        </span>
        <span class="header__caret" aria-hidden="true"></span>
      </button>

      <div class="header__dropdown app-card" *ngIf="isMenuOpen" role="menu">
        <div class="header__dropdown-meta">
          <strong>{{ session.user.name }}</strong>
          <span>{{ session.user.roleLabel }}</span>
        </div>

        <button type="button" class="header__dropdown-item" (click)="openProfile()">
          Profile
        </button>
        <button type="button" class="header__dropdown-item" (click)="openSettings()">
          Settings
        </button>
        <button
          type="button"
          class="header__dropdown-item header__dropdown-item--danger"
          (click)="signOut()"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
</header>
